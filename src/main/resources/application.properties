spring.application.name=user-service-api

server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5433/user_db
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

spring.sql.init.mode=never
spring.sql.init.platform=postgresql

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.consumer.group-id=user-stats-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/activity-hub-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/activity-hub-realm/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.token-uri=http://localhost:8080/realms/activity-hub-realm/protocol/openid-connect/token
public.key.
keycloak.realm=activity-hub-realm
keycloak.auth-server-url=http://localhost:8080
keycloak.admin-username=admin
keycloak.admin-password=admin
keycloak.client-id=activity-hub-client
keycloak.client-secret=bGbIJMGL7Qw6p8pThYGdJlr5NAkPVNl3


eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

logging.level.org.springframework.web=TRACE
logging.level.com.activity_hub=DEBUG

spring.jackson.deserialization.fail-on-unknown-properties=false






